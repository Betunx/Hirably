<!-- Mobile Carousel: swipe + arrows + optional dots -->
<div #container
     class="relative w-full overflow-hidden"
     (touchstart)="onTouchStart($event)"
     (touchmove)="onTouchMove($event)"
     (touchend)="onTouchEnd()">

  <!-- Slides Track -->
  <div #track
       class="flex"
       [class.transition-transform]="!isDragging"
       [class.duration-300]="!isDragging"
       [class.ease-out]="!isDragging"
       [style.transform]="getTrackTransform()"
       [style.padding-left]="getTrackOffset()">
    <ng-content></ng-content>
  </div>

  <!-- Arrow: Previous -->
  <button *ngIf="showArrows && currentIndex > 0"
          (click)="goToPrev()"
          class="absolute left-1 top-1/2 -translate-y-1/2 z-10
                 w-8 h-8 flex items-center justify-center
                 rounded-full bg-white/40 backdrop-blur-sm
                 text-navy-dark/60 transition-opacity duration-200
                 hover:bg-white/60 active:bg-white/70"
          style="-webkit-backdrop-filter: blur(4px);"
          aria-label="Previous slide">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none"
         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
    </svg>
  </button>

  <!-- Arrow: Next -->
  <button *ngIf="showArrows && currentIndex < totalSlides - 1"
          (click)="goToNext()"
          class="absolute right-1 top-1/2 -translate-y-1/2 z-10
                 w-8 h-8 flex items-center justify-center
                 rounded-full bg-white/40 backdrop-blur-sm
                 text-navy-dark/60 transition-opacity duration-200
                 hover:bg-white/60 active:bg-white/70"
          style="-webkit-backdrop-filter: blur(4px);"
          aria-label="Next slide">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none"
         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
    </svg>
  </button>
</div>

<!-- Dot Indicators -->
<div *ngIf="showDots" class="flex justify-center gap-2 mt-6">
  <button *ngFor="let dot of slidesArray; let i = index"
          (click)="goTo(i)"
          class="w-2.5 h-2.5 rounded-full transition-all duration-300"
          [class.bg-navy-dark]="i === currentIndex"
          [class.scale-125]="i === currentIndex"
          [class.bg-gray-300]="i !== currentIndex"
          [attr.aria-label]="'Go to slide ' + (i + 1)">
  </button>
</div>
