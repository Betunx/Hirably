<!-- Services 3D Perspective Carousel -->
<div class="carousel-container"
     (touchstart)="onTouchStart($event)"
     (touchmove)="onTouchMove($event)"
     (touchend)="onTouchEnd($event)">

  <!-- Cards Stage -->
  <div class="cards-stage">
    <!-- Card 0 -->
    <div class="card-wrapper"
         [style.transform]="getCardTransform(0)"
         [style.z-index]="getCardZIndex(0)"
         [style.opacity]="getCardOpacity(0)">
      <div class="card-inner">
        <ng-content select="[slot='card-0']"></ng-content>
      </div>
    </div>
    <!-- Card 1 -->
    <div class="card-wrapper"
         [style.transform]="getCardTransform(1)"
         [style.z-index]="getCardZIndex(1)"
         [style.opacity]="getCardOpacity(1)">
      <div class="card-inner">
        <ng-content select="[slot='card-1']"></ng-content>
      </div>
    </div>
    <!-- Card 2 -->
    <div class="card-wrapper"
         [style.transform]="getCardTransform(2)"
         [style.z-index]="getCardZIndex(2)"
         [style.opacity]="getCardOpacity(2)">
      <div class="card-inner">
        <ng-content select="[slot='card-2']"></ng-content>
      </div>
    </div>
  </div>

  <!-- Arrow: Previous (always visible - infinite carousel) -->
  <button (click)="goToPrev(); $event.stopPropagation()"
          class="arrow-btn arrow-left"
          aria-label="Previous card">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none"
         viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
    </svg>
  </button>

  <!-- Arrow: Next (always visible - infinite carousel) -->
  <button (click)="goToNext(); $event.stopPropagation()"
          class="arrow-btn arrow-right"
          aria-label="Next card">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none"
         viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
    </svg>
  </button>
</div>

<!-- Dot Indicators -->
<div class="flex justify-center gap-2.5 mt-5">
  <button *ngFor="let i of slidesArray"
          (click)="activeIndex = i"
          class="w-2 h-2 rounded-full transition-all duration-300"
          [class.bg-navy-dark]="i === activeIndex"
          [class.scale-150]="i === activeIndex"
          [class.bg-gray-300]="i !== activeIndex"
          [attr.aria-label]="'Go to card ' + (i + 1)">
  </button>
</div>
